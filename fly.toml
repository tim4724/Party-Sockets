app = "party-sockets"
primary_region = "fra"

# Give the relay's drain logic up to 5 min to let active games finish before
# forced shutdown. Empty machines stop instantly because drain exits as soon
# as rooms.size = 0.
kill_timeout = 300

[build]

[env]
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    soft_limit = 50
    hard_limit = 2000

  # Gate fly-proxy routing on the app actually being ready. Bun binds port 3000
  # in ~900ms; 3s grace gives a comfortable margin and avoids the PC01
  # "instance refused connection" race we saw on cold-start. During the grace
  # window, fly-proxy routes to the warm sibling instead.
  [[http_service.checks]]
    interval     = "10s"
    timeout      = "2s"
    grace_period = "3s"
    method       = "GET"
    path         = "/health"
    protocol     = "http"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256

[deploy]
  strategy = "rolling"
  # Default is 0.33 (≈5 of 14 simultaneously), which created a wake stampede on
  # the 2.0.2 deploy: all fra/iad machines lease-locked at once, so user
  # requests fell back cross-region to whichever distant machine had finished
  # its turn (SYD). Serial rollout means at most 1 machine is mid-restart;
  # the other 13 stay proxy-wakeable for incoming traffic throughout.
  max_unavailable = 1
  # Default 5m equals kill_timeout exactly, so flyctl bails right when drain
  # finishes and before restart begins. 10m gives drain (5m max) + restart +
  # health-check headroom.
  wait_timeout = "10m"

# Fly auto-scrapes /metrics every 15s and pushes to fly-metrics.net.
[[metrics]]
  port = 3000
  path = "/metrics"
